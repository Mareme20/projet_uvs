services:
  app:
    build:
      context: .
    ports:
      - "10000:10000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: clinique_iibs
      DB_USERNAME: postgres
      DB_PASSWORD: passer
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinique_iibs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinique_iibs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
